<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>教会同声翻译</title>
  <style>
    :root {
      --bg: #0d0d1a;
      --surface: #161628;
      --accent: #7c6af7;
      --text-main: #f0f0ff;
      --text-secondary: #8888aa;
      --text-history: #555577;
      --border: #2a2a45;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text-main);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #header .title {
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    #status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    #dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      transition: background 0.4s;
    }
    #dot.connected { background: #4caf82; }
    #dot.error     { background: #e05555; }

    /* ── Full-screen flowing subtitle stream ── */
    #subtitle-stream {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-top: 2px solid var(--accent);
      scroll-behavior: smooth;
    }
    #subtitle-body {
      flex: 1;
      padding: 20px 24px 80px;
      overflow-y: auto;
    }
    #subtitle-list {
      padding: 10px 12px;
      border-left: 2px solid var(--border);
      font-size: clamp(32px, 5.5vw, 56px);
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-main);
      letter-spacing: 0.03em;
      white-space: normal;
      word-break: break-word;
    }
    .s-sentence {
      animation: fadeIn 0.35s ease both;
      transition: color 0.3s;
    }
    .s-sentence.latest {
      color: #ffd54f;
      font-weight: 700;
      font-size: 1.15em;
    }
    body.tts-active .s-sentence.latest {
      color: inherit;
      font-weight: inherit;
      font-size: inherit;
    }
    .s-sentence.speaking,
    body.tts-active .s-sentence.speaking {
      color: #66ff99;
      text-shadow: 0 0 6px rgba(102, 255, 153, 0.3);
    }
    .s-sentence.revised {
      animation: revisionFlash 0.4s ease;
    }

    #current-line { display: none; }

    /* ── QR corner ── */
    #qr-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 40px; height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s;
    }
    #qr-btn:hover { background: #222240; }
    #qr-btn svg { width: 20px; height: 20px; fill: var(--text-secondary); }

    #tts-hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(22, 22, 40, 0.92);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 15;
      display: none;
    }

    #tts-btn {
      position: fixed;
      bottom: 20px;
      right: 68px;
      height: 40px;
      padding: 0 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      z-index: 10;
      display: none;
    }
    #tts-btn.on {
      border-color: var(--accent);
      color: var(--text-main);
    }

    #qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 20;
      align-items: center;
      justify-content: center;
    }
    #qr-modal.open { display: flex; }
    #qr-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      max-width: 90vw;
    }
    #qr-box img { width: 200px; height: 200px; border-radius: 8px; }
    #qr-box p  { margin-top: 12px; font-size: 13px; color: var(--text-secondary); }
    #qr-box a  { color: var(--accent); }

    /* ── Waiting state ── */
    #waiting {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 15px;
    }
    .pulse {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.2); }
    }
    @keyframes revisionFlash {
      0%   { opacity: 1; }
      30%  { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* ── Projector mode (/?mode=projector) ── */
    body.projector #subtitle-body {
      padding: 28px 48px 12px;
    }
    body.projector #subtitle-list {
      font-size: clamp(42px, 6.5vw, 76px);
      line-height: 1.28;
    }
    body.projector #header { display: none; }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div id="header">
    <span class="title">教会同声翻译 · 粤 → 普</span>
    <div id="status">
      <div id="dot"></div>
      <span id="status-text">连接中…</span>
    </div>
  </div>

  <!-- Flowing subtitle stream -->
  <div id="subtitle-stream">
    <div id="subtitle-body">
      <div id="waiting">
        <span class="pulse"></span>
        等待讲道开始…
      </div>
      <div id="subtitle-list"></div>
    </div>
    <div id="current-line"></div>
  </div>

</div>

<!-- QR code button -->
<button id="qr-btn" title="显示二维码">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 3h7v7H3V3zm1 1v5h5V4H4zm1 1h3v3H5V5zM3 14h7v7H3v-7zm1 1v5h5v-5H4zm1 1h3v3H5v-3zM14 3h7v7h-7V3zm1 1v5h5V4h-5zm1 1h3v3h-3V5zM14 14h2v2h-2v-2zm3 0h2v2h-2v-2zm-3 3h2v2h-2v-2zm3 0h2v2h-2v-2zm0 3h4v1h-4v-1z"/>
  </svg>
</button>
<button id="tts-btn" title="开启/关闭语音">🔊 语音关</button>

<!-- QR modal -->
<div id="qr-modal">
  <div id="qr-box">
    <img id="qr-img" src="" alt="二维码" />
    <p>同一 WiFi 下扫码，在手机上查看字幕</p>
    <p><a id="qr-url" href="#" target="_blank"></a></p>
    <p style="margin-top:16px; font-size:12px; color:#444">点击任意处关闭</p>
  </div>
</div>

<!-- TTS unlock hint -->
<div id="tts-hint">点一下屏幕，开启语音播报</div>

<script>
  // ── Projector mode ──────────────────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  if (params.get("mode") === "projector") {
    document.body.classList.add("projector");
  }

  // ── Elements ────────────────────────────────────────────────────────────────
  const dot            = document.getElementById("dot");
  const statusText     = document.getElementById("status-text");
  const subtitleStream = document.getElementById("subtitle-stream");
  const subtitleBody   = document.getElementById("subtitle-body");
  const subtitleList   = document.getElementById("subtitle-list");
  const currentLine    = document.getElementById("current-line");
  const waiting        = document.getElementById("waiting");
  const qrBtn          = document.getElementById("qr-btn");
  const qrModal        = document.getElementById("qr-modal");
  const qrImg          = document.getElementById("qr-img");
  const qrUrl          = document.getElementById("qr-url");
  const ttsHint        = document.getElementById("tts-hint");
  const ttsBtn         = document.getElementById("tts-btn");

  const MAX_LINES = 60;
  const ttsEnabledByParam = params.get("tts") === "1" && !document.body.classList.contains("projector");
  let ttsUnlocked = false;
  let ttsEnabled = ttsEnabledByParam;
  let ttsSpeaking = false;
  const ttsQueue = [];
  const ttsAudio = new Audio();

  function unlockTTS() {
    if (!ttsEnabled || ttsUnlocked) return;
    ttsUnlocked = true;
    ttsHint.style.display = "none";
    ttsBtn.classList.add("on");
    ttsBtn.textContent = "🔊 语音开";
    document.body.classList.add("tts-active");
    playNext();
  }

  function _clearSpeaking() {
    subtitleList.querySelectorAll(".s-sentence.speaking").forEach(el => el.classList.remove("speaking"));
  }

  function handleTTSMessage(sids, audioB64) {
    if (!ttsEnabled) return;
    ttsQueue.push({ sids, audioB64 });
    if (ttsUnlocked) playNext();
  }

  function playNext() {
    if (!ttsEnabled || !ttsUnlocked || ttsSpeaking || ttsQueue.length === 0) return;
    const item = ttsQueue.shift();
    ttsSpeaking = true;
    _clearSpeaking();
    (item.sids || []).forEach(sid => {
      const el = subtitleList.querySelector(`.s-sentence[data-sid="${sid}"]`);
      if (el) el.classList.add("speaking");
    });
    const binary = atob(item.audioB64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: "audio/mpeg" });
    const url = URL.createObjectURL(blob);
    ttsAudio.src = url;
    ttsAudio.play().then(() => {
      ttsAudio.onended = () => {
        URL.revokeObjectURL(url);
        _clearSpeaking();
        ttsSpeaking = false;
        playNext();
      };
    }).catch(err => {
      console.warn("TTS 播放失败", err);
      URL.revokeObjectURL(url);
      _clearSpeaking();
      ttsSpeaking = false;
      playNext();
    });
  }

  // ── WebSocket ────────────────────────────────────────────────────────────────
  let ws, reconnectTimer;

  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => {
      dot.className = "connected";
      statusText.textContent = "已连接";
    };

    ws.onclose = () => {
      dot.className = "error";
      statusText.textContent = "已断开，重连中…";
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      dot.className = "error";
      statusText.textContent = "连接错误";
    };

    ws.onmessage = (evt) => {
      const msg = JSON.parse(evt.data);
      if (msg.type === "tts") {
        handleTTSMessage(msg.sids, msg.audio);
      } else if (msg.type === "revision") {
        applyRevision(msg.lines);
      } else {
        updateSubtitle(msg.sid, msg.original, msg.translated);
      }
    };
  }

  // ── Subtitle update ──────────────────────────────────────────────────────────

  function updateSubtitle(sid, original, translated) {
    waiting.style.display = "none";
    pushLine(sid, original, translated);
  }

  function pushLine(sid, orig, trans) {
    const prevLatest = subtitleList.querySelector(".s-sentence.latest");
    if (prevLatest) {
      prevLatest.classList.remove("latest");
    }

    const span = document.createElement("span");
    span.className = "s-sentence latest";
    span.dataset.sid = sid;
    span.textContent = trans;

    if (subtitleList.querySelectorAll(".s-sentence").length > 0) {
      subtitleList.appendChild(document.createTextNode(" "));
    }
    subtitleList.appendChild(span);

    const spans = subtitleList.querySelectorAll(".s-sentence");
    while (spans.length > MAX_LINES) {
      const first = spans[0];
      if (first.previousSibling && first.previousSibling.nodeType === 3) {
        first.previousSibling.remove();
      }
      first.remove();
      break;
    }

    subtitleBody.scrollTop = subtitleBody.scrollHeight;
  }

  function applyRevision(lines) {
    const spans = subtitleList.querySelectorAll(".s-sentence");
    if (!lines.length || !spans.length) return;

    const offset = Math.max(0, lines.length - spans.length);
    for (let i = 0; i < spans.length; i++) {
      const lineIdx = offset + i;
      if (lineIdx >= lines.length) break;
      const revised = lines[lineIdx];
      if (!revised || revised === "[重复]") continue;
      if (spans[i].textContent !== revised) {
        spans[i].textContent = revised;
        spans[i].classList.remove("revised");
        void spans[i].offsetWidth;
        spans[i].classList.add("revised");
      }
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ── QR Code ──────────────────────────────────────────────────────────────────
  async function loadQR() {
    try {
      const res  = await fetch("/qr");
      const data = await res.json();
      qrImg.src         = `data:image/png;base64,${data.qr}`;
      qrUrl.href        = data.url;
      qrUrl.textContent = data.url;
    } catch (e) {
      console.warn("无法加载二维码", e);
    }
  }

  qrBtn.addEventListener("click", async () => {
    if (!qrImg.src.startsWith("data:")) await loadQR();
    qrModal.classList.add("open");
  });
  qrModal.addEventListener("click", () => qrModal.classList.remove("open"));
  document.getElementById("qr-box").addEventListener("click", e => e.stopPropagation());

  if (ttsEnabledByParam) {
    ttsBtn.style.display = "block";
    ttsHint.style.display = "block";
    document.body.addEventListener("click", unlockTTS, { once: true });
    document.body.addEventListener("touchstart", unlockTTS, { once: true });
  }
  ttsBtn.addEventListener("click", () => {
    ttsEnabled = !ttsEnabled;
    if (ttsEnabled) {
      ttsHint.style.display = "block";
      unlockTTS();
      playNext();
    } else {
      ttsUnlocked = false;
      ttsHint.style.display = "none";
      ttsBtn.classList.remove("on");
      ttsBtn.textContent = "🔊 语音关";
      document.body.classList.remove("tts-active");
      ttsQueue.length = 0;
      _clearSpeaking();
      ttsAudio.pause();
      ttsAudio.src = "";
    }
  });

  // ── Init ─────────────────────────────────────────────────────────────────────
  connect();
  loadQR();
</script>
</body>
</html>
